# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy with: Render Dashboard → New → Blueprint → point at this repo.
# See README.md "Deployment" section for the full step-by-step guide.

databases:
  - name: english-path-ai-db
    plan: free
    region: oregon
    databaseName: english_path_ai
    user: english_path_ai

services:
  - type: web
    name: english-path-ai
    runtime: node
    plan: free
    # Must match the database's region — Render's private network (and the
    # dpg-... internal hostname DATABASE_URL points at) only resolves within
    # a single region. Free-tier Postgres isn't available in every region,
    # so pin both explicitly instead of leaving the database's region to
    # whatever it happens to default to.
    region: oregon
    # --include=dev is required: NODE_ENV=production (set below) makes plain
    # `npm ci` skip devDependencies, but the build needs typescript/@types/node
    # to compile — the compiled dist/ output is what actually ships.
    buildCommand: npm ci --include=dev && npm run build
    # Migrations run at startup, not in buildCommand: Render's build step runs
    # in an isolated environment without private-network access to the
    # database (a free-tier Postgres's internal hostname resolves only at
    # runtime), so `prisma migrate deploy` has to happen here instead.
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: english-path-ai-db
          property: connectionString
      # Everything below must be filled in manually in the Render dashboard
      # (Environment tab) — see README.md for where to get each value.
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: BOT_WEBHOOK_URL
        sync: false # e.g. https://english-path-ai.onrender.com (this service's own public URL)
      - key: BOT_WEBHOOK_SECRET
        generateValue: true
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: DEFAULT_TIMEZONE
        value: Europe/Kyiv
      - key: LOG_LEVEL
        value: info
